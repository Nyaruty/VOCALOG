<!doctype html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>新着 - VOCALOG</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="header"></div>

  <main class="wrap">
    <div class="card">
      <h2 class="title" style="margin:0;">新着</h2>
      <p class="muted" id="sub"></p>
    </div>

    <section class="card">
      <h3 class="title" style="margin:0;">今週のおすすめ</h3>
      <p class="muted">今週追加の中からピックアップ</p>
      <div id="weeklyPicks" class="grid"></div>
    </section>

    <section class="card">
      <h3 class="title" style="margin:0;">今週追加</h3>
      <p class="muted" id="weekCount"></p>
      <div id="weekList" class="grid"></div>
    </section>

    <section class="card">
      <div class="row" style="align-items:center;">
        <h3 class="title" style="margin:0;">新着一覧</h3>
        <a class="btn" id="backToLatest" href="./new.html" style="text-align:center; text-decoration:none;">最新に戻る</a>
      </div>
      <p class="muted">週ごとにまとめて表示（タップで切り替え）</p>
      <div id="archive" class="list"></div>
    </section>

    <div class="footer">© VOCALOG</div>
  </main>

  <script src="./theme.js"></script>
  <script type="module" src="./new.js"></script>
</body>
</html>
